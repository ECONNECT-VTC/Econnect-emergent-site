name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # --legacy-peer-deps is required because react 19 has peer conflicts with
        # some packages that declare react <=18 as a peer dependency.
        run: npm install --legacy-peer-deps

      - name: Run tests
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests

  backend:
    name: Backend (syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sources (syntax check)
        run: python -m compileall -q server.py

      # NOTE: backend_test.py is an integration script that targets a remote
      # deployed environment (https://driver-platform-28.preview.emergentagent.com)
      # and requires a running MongoDB instance. It is intentionally NOT run here
      # to avoid systematic failures. Run it manually against a live backend.
